services:
  nginx:
    image: nginx:latest  
    ports:
      - "8080:80"  # Expose container port 80 on host port 8080
    volumes:
      - ./web:/var/www/html  # Mount app code
      - ./etc/nginx/nginx.docker.conf:/etc/nginx/conf.d/default.conf  # Custom Nginx config
    depends_on:
      - php  # Start PHP before Nginx
    networks:
      - internal  # Internal network for service communication

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./web:/var/www/html  # Mount app code
      - ./data/logs:/var/www/data/logs
      - ${PHP_INI_PATH:-./etc/php/php.ini}:/usr/local/etc/php/conf.d/php.ini  # Custom PHP config
    env_file:
      - .env
    networks:
      - internal

  composer:
    image: composer:2.7  # Composer for dependency installation
    volumes:
      - ./web/app:/app  # Mount app code
    working_dir: /app
    command: install  # Run `composer install` on start
    depends_on:
      - php

  db:
    image: mysql:${MYSQL_VERSION:-8.0.34}  # MySQL version from .env (default: 8.0.34)
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/db/mysql:/var/lib/mysql  # Persist DB data
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  internal:
    driver: bridge  # Isolated network for containers

volumes:
  db_data:  # Named volume for MySQL persistence
