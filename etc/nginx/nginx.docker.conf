# Main server block
server {
    listen 80;
    server_name localhost;

    # Root directory for the project inside container
    root /var/www/html/public;
    index index.php index.html;

    # Limit maximum file upload size (e.g., 10MB)
    client_max_body_size 10M;

    # Enable gzip for text-based content
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Serve static assets (CSS, JS, images)
    location /assets/ {
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /images/ {
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Handle PHP requests via PHP-FPM container
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;   # name of the service in docker-compose.yml
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Route all other requests to index.php (for PHP router)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}
